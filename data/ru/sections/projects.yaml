- name: 🚀 CI/CD с GitLab + Kubernetes
  url: "/posts/ci-cd-gitlab/"
  summary: |
    Настроил полный CI/CD пайплайн с GitLab CI, Docker и Kubernetes для стартапа
    
    **Результаты:**
    - ✅ Время деплоя: с 2 часов до 10 минут
    - ✅ Ошибки при деплое: −90%
